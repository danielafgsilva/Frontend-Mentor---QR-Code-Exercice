<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  
  <title>Frontend Mentor | QR code component</title>
</head>
<body>
  <main class="main">
    <div class="card">
      <div class="card-image-container">
        <img class="card-image" src="images/image-qr-code.png" alt="QR code">
        <div class="card-image-text-container">
          <h1 class="card-image-title">Improve your front-end skills by building projects</h1>
          <p class="card-image-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
        </div>
    </div>
  </main>
</body>
</html>
